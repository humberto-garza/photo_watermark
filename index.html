<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Watermark Tool</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="menu-bar">
        <div class="menu-bar-content">
            <h1 class="app-title" data-translate="app-title">Photo Watermark Tool</h1>
            <div class="language-switcher">
                <button id="language-burger" class="burger-btn">
                    <div class="burger-icon">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <span class="current-language">EN</span>
                </button>
                <div id="language-menu" class="language-menu hidden">
                    <div class="language-option" data-lang="en">English</div>
                    <div class="language-option" data-lang="es">Español</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="main-content">
            <!-- Left Panel - Controls -->
            <div class="control-panel">
                <div class="upload-section">
                    <h2 data-translate="images-section-title">Images</h2>
                    <input type="file" id="file-input" accept="image/*" multiple>
                    <label for="file-input" class="upload-btn" data-translate="choose-images-btn">Choose Images</label>
                    <div id="dpi-info" class="dpi-info"></div>
                    
                    <!-- Mobile Image Preview -->
                    <div id="mobile-image-preview" class="mobile-image-preview hidden">
                        <h3 data-translate="selected-image-title">Selected Image</h3>
                        <div class="mobile-image-container">
                            <img id="mobile-preview-img" alt="Selected image">
                        </div>
                        <p class="mobile-progress-text" data-translate="mobile-progress-text">Now choose a watermark image below</p>
                    </div>
                </div>
                
                <div class="watermark-section">
                    <h2 data-translate="watermark-options-title">Watermark</h2>
                    <div class="watermark-upload">
                        <input type="file" id="watermark-input" accept="image/*">
                        <label for="watermark-input" class="upload-btn watermark-btn" data-translate="choose-watermark-btn">Choose Watermark</label>
                        <div id="watermark-display" class="watermark-preview"></div>
                    </div>
                    
                    <div class="settings desktop-only">
                        <div class="setting-row">
                            <label for="watermark-size" data-translate="size-label">Size:</label>
                            <input type="range" id="watermark-size" min="0.01" max="1" step="0.01" value="0.2">
                            <span id="size-value">20%</span>
                        </div>
                        
                        <div class="setting-row">
                            <label for="watermark-opacity" data-translate="opacity-label">Opacity:</label>
                            <input type="range" id="watermark-opacity" min="0.01" max="1" step="0.01" value="0.8">
                            <span id="opacity-value">80%</span>
                        </div>
                        
                        <div class="setting-row checkbox-row">
                            <label for="watermark-negative" class="checkbox-label">
                                <input type="checkbox" id="watermark-negative">
                                <span data-translate="invert-color-label">Invert Color</span>
                            </label>
                        </div>
                        
                        <div class="position-control">
                            <label data-translate="position-label">Position:</label>
                            <div class="position-area" id="watermark-position-container">
                                <div class="watermark-dot"></div>
                            </div>
                            <p class="position-instruction" data-translate="position-instruction">Drag to position</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Right Panel - Content -->
            <div class="content-panel desktop-only">
                <div class="images-grid">
                    <h3 data-translate="original-images-title">Original Images</h3>
                    <div id="image-container" class="image-grid"></div>
                </div>
                
                <div class="results-grid">
                    <h3 data-translate="watermarked-images-title">Watermarked Images</h3>
                    <div id="watermarked-image-container" class="image-grid"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
